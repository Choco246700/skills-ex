<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills EX — Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <!-- HEADER -->
  <header id="mainHeader">
    <div class="header-top">
      <a href="homepage.html" class="logo-brand">Skills<span> EX</span></a>
      <nav class="main-nav" id="mainNav">
        <ul class="nav-list">
          <!-- Will be injected by JS -->
        </ul>
        <div id="authHeaderAction"></div>
      </nav>
      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="chat-layout" id="chatContainer" style="display: none;">
    <!-- Sidebar: Contacts -->
    <aside class="chat-sidebar">
      <div class="chat-sidebar-header">Conversations</div>
      <div class="chat-contact-list" id="chatContacts">
        <!-- Contact items injected by JS -->
        <div style="padding: 20px; color: var(--muted); font-size: 14px;">Loading chats...</div>
      </div>
    </aside>

    <!-- Main Message Area -->
    <section class="chat-main" id="chatMainPlaceholder" style="justify-content: center; align-items: center; background: var(--warm-white);">
      <p style="color: var(--muted); font-size: 15px;">Select a conversation to start chatting.</p>
    </section>

    <section class="chat-main" id="chatMainActive" style="display: none;">
      <div class="chat-header">
        <div class="user-avatar" id="activeChatAvatar" style="width: 40px; height: 40px; font-size: 16px;"></div>
        <div style="font-weight: 600; color: var(--ink); font-size: 16px;" id="activeChatName">Loading...</div>
      </div>
      <div class="chat-messages" id="chatMessages">
        <!-- Messages injected here -->
      </div>
      <form class="chat-input-area" id="chatForm">
        <input type="text" class="chat-input" id="chatInput" placeholder="Type a message..." autocomplete="off">
        <button type="submit" class="chat-send-btn" aria-label="Send Message">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </form>
    </section>
  </main>

  <!-- Unauthenticated Fallback -->
  <main id="unauthChat" style="max-width: 500px; margin: 80px auto; display: none; text-align: center;">
    <div class="form-card" style="padding: 48px 32px;">
      <div style="width: 80px; height: 80px; background: rgba(194,98,63,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--terracotta)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
      </div>
      <p class="form-card-title">Log in to Chat</p>
      <p class="form-card-sub" style="margin-bottom: 24px;">Message other community members to set up a skill exchange.</p>
      <a href="login.html" class="btn-submit" style="display: inline-block; text-decoration: none; background: var(--terracotta); color: white;">Log In</a>
      <a href="signup.html" class="btn-submit" style="display: inline-block; text-decoration: none; background: transparent; color: var(--terracotta); border: 2px solid var(--terracotta); margin-top: 12px;">Sign Up</a>
    </div>
  </main>

  <div id="toast"></div>
  <script src="./index.js"></script>
</body>
</html>
